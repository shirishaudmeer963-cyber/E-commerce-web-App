<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Shirisha Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h2>🛒 Shopping Cart</h2>
</header>

<div class="cart-container">

    <div class="cart-item">
        <h3>Wireless Headphones</h3>
        <p>₹999</p>
    </div>

    <div class="cart-item">
        <h3>Smart Watch</h3>
        <p>₹1999</p>
    </div>

    <div class="total">
        <h2>Total: ₹2998</h2>

        <button onclick="window.location.href='checkout.html'">
            Proceed to Checkout
        </button>
    </div>

</div>

</body>
</html>
